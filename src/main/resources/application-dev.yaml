spring:
  # Database connection
  datasource:
    driver-class-name: org.postgresql.Driver
    username: admin
    password: admin@123
    url: jdbc:postgresql://localhost:5432/ecommerce_db?createDatabaseIfNotExist=true

  # JPA related configurations
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

# Stripe Payment Configuration
stripe:
  api-key: STRIPE_SECRET_KEY
  success-url: http://localhost:8080/api/v1/payments/success?session_id={CHECKOUT_SESSION_ID}
  cancel-url: http://localhost:8080/api/v1/payments/failed?session_id={CHECKOUT_SESSION_ID}
  currency: bdt

# Logging Configuration
logging:
  level:
    com:
      example:
        ecommerce_service: INFO
